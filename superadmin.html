<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperAdmin — Cubierto</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='88' font-family='Georgia,serif' font-style='italic' fill='%23c8b89a'>C</text></svg>">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <style>
        /* ── PAGE ──────────────────────────────────── */
        body { background: #0e0e0e; }

        .sa-wrap {
            max-width: 1440px;
            margin: 0 auto;
            padding: 1.6rem 1.5rem 5rem;
            display: flex;
            flex-direction: column;
            gap: 1.6rem;
        }

        /* ── LOADING ───────────────────────────────── */
        .sa-loading {
            text-align: center;
            padding: 6rem 2rem;
            color: rgba(200,184,154,.4);
            font-size: .9rem;
            letter-spacing: 1px;
        }

        /* ── STATS ROW ─────────────────────────────── */
        .sa-stats {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
        }
        .sa-stat {
            background: #1a1a1a;
            border: 1px solid rgba(124,108,92,.18);
            border-radius: 14px;
            padding: .9rem 1.1rem;
            display: flex;
            flex-direction: column;
            gap: .35rem;
        }
        .sa-stat-icon { font-size: .95rem; }
        .sa-stat-num {
            font-size: 1.8rem;
            font-weight: 700;
            color: #c8b89a;
            line-height: 1;
        }
        .sa-stat-label {
            font-size: .65rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(200,184,154,.45);
        }

        /* ── CHARTS ROW ────────────────────────────── */
        .sa-charts {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 1rem;
        }
        .sa-chart-card {
            background: #1a1a1a;
            border: 1px solid rgba(124,108,92,.18);
            border-radius: 14px;
            padding: 1.4rem 1.6rem;
        }
        .sa-chart-title {
            font-size: .72rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(200,184,154,.45);
            margin-bottom: 1.2rem;
        }

        /* ── SECTION ───────────────────────────────── */
        .sa-section {
            background: #1a1a1a;
            border: 1px solid rgba(124,108,92,.18);
            border-radius: 14px;
            overflow: hidden;
        }
        .sa-section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 1.5rem;
            border-bottom: 1px solid rgba(124,108,92,.12);
            flex-wrap: wrap;
            gap: .8rem;
        }
        .sa-section-title {
            font-size: .78rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(200,184,154,.45);
            margin: 0;
        }
        .sa-controls {
            display: flex;
            align-items: center;
            gap: .8rem;
            flex-wrap: wrap;
        }
        .sa-search {
            background: #111;
            border: 1px solid rgba(124,108,92,.2);
            border-radius: 8px;
            color: #c8b89a;
            font-size: .78rem;
            padding: .35rem .8rem;
            outline: none;
            width: 180px;
        }
        .sa-search::placeholder { color: rgba(200,184,154,.3); }
        .sa-search:focus { border-color: rgba(124,108,92,.45); }

        .sa-filter-tabs { display: flex; gap: .3rem; }
        .sa-tab {
            background: none;
            border: 1px solid rgba(124,108,92,.2);
            color: rgba(200,184,154,.45);
            border-radius: 20px;
            padding: .25rem .75rem;
            font-size: .7rem;
            cursor: pointer;
            transition: all .15s;
        }
        .sa-tab.active, .sa-tab:hover {
            border-color: rgba(124,108,92,.5);
            color: #c8b89a;
            background: rgba(124,108,92,.08);
        }

        /* ── TABLE ─────────────────────────────────── */
        .sa-table-wrap { overflow-x: auto; }
        .sa-table {
            width: 100%;
            border-collapse: collapse;
            font-size: .8rem;
        }
        .sa-table thead th {
            padding: .75rem 1.2rem;
            text-align: left;
            font-size: .65rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(200,184,154,.35);
            border-bottom: 1px solid rgba(124,108,92,.1);
            white-space: nowrap;
        }
        .sa-table tbody tr {
            border-bottom: 1px solid rgba(124,108,92,.07);
            transition: background .15s;
        }
        .sa-table tbody tr:last-child { border-bottom: none; }
        .sa-table tbody tr:hover { background: rgba(124,108,92,.04); }
        .sa-table td {
            padding: .9rem 1.2rem;
            vertical-align: middle;
            color: rgba(200,184,154,.75);
        }

        /* ── USER CELL ─────────────────────────────── */
        .sa-user-cell { display: flex; align-items: center; gap: .75rem; }
        .sa-avatar {
            width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: .75rem; font-weight: 700;
            flex-shrink: 0;
            color: #0e0e0e;
        }
        .sa-user-name { font-weight: 500; color: #c8b89a; font-size: .82rem; }
        .sa-user-email { font-size: .68rem; color: rgba(200,184,154,.4); margin-top: .1rem; }

        /* ── BADGES ────────────────────────────────── */
        .sa-badge {
            display: inline-flex; align-items: center;
            border-radius: 20px; padding: .2rem .7rem;
            font-size: .68rem; font-weight: 600;
            letter-spacing: .3px; white-space: nowrap;
        }
        .sa-badge-rest {
            background: rgba(124,108,92,.12);
            color: rgba(200,184,154,.7);
            border: 1px solid rgba(124,108,92,.2);
        }
        .sa-badge-active {
            background: rgba(40,167,69,.12);
            color: #5cbf7a;
            border: 1px solid rgba(40,167,69,.25);
        }
        .sa-badge-unpaid {
            background: rgba(240,160,0,.1);
            color: #f0a500;
            border: 1px solid rgba(240,160,0,.25);
        }
        .sa-badge-blocked {
            background: rgba(220,53,69,.1);
            color: #e06070;
            border: 1px solid rgba(220,53,69,.25);
        }
        .sa-badge-pending {
            background: rgba(0,158,227,.1);
            color: #4dbfe8;
            border: 1px solid rgba(0,158,227,.25);
        }

        /* ── ACTIONS ───────────────────────────────── */
        .sa-actions { display: flex; gap: .4rem; flex-wrap: wrap; }
        .sa-btn {
            border-radius: 6px; padding: .25rem .7rem;
            font-size: .68rem; cursor: pointer;
            border: 1px solid; transition: all .15s;
            white-space: nowrap;
        }
        .sa-btn-paid {
            background: rgba(40,167,69,.1);
            border-color: rgba(40,167,69,.35);
            color: #5cbf7a;
        }
        .sa-btn-paid:hover { background: rgba(40,167,69,.2); }
        .sa-btn-unpaid {
            background: rgba(240,160,0,.08);
            border-color: rgba(240,160,0,.35);
            color: #f0a500;
        }
        .sa-btn-unpaid:hover { background: rgba(240,160,0,.16); }
        .sa-btn-block {
            background: rgba(220,53,69,.08);
            border-color: rgba(220,53,69,.3);
            color: #e06070;
        }
        .sa-btn-block:hover { background: rgba(220,53,69,.18); }
        .sa-btn-unblock {
            background: rgba(124,108,92,.1);
            border-color: rgba(124,108,92,.35);
            color: #c8b89a;
        }
        .sa-btn-unblock:hover { background: rgba(124,108,92,.2); }
        .sa-btn-delete {
            background: rgba(180,30,40,.08);
            border-color: rgba(180,30,40,.25);
            color: rgba(220,80,80,.7);
        }
        .sa-btn-delete:hover { background: rgba(180,30,40,.18); color:#e06070; }
        .sa-btn-view {
            background: rgba(124,108,92,.08);
            border-color: rgba(124,108,92,.28);
            color: rgba(200,184,154,.65);
        }
        .sa-btn-view:hover { background: rgba(124,108,92,.18); color:#c8b89a; }
        .sa-btn-prices {
            background: rgba(80,130,180,.08);
            border-color: rgba(80,130,180,.3);
            color: rgba(130,180,220,.75);
        }
        .sa-btn-prices:hover { background: rgba(80,130,180,.18); color:#a8d0f0; }

        .sa-empty {
            text-align: center; padding: 3rem;
            color: rgba(200,184,154,.3); font-size: .82rem;
        }

        /* ── PLAN CARDS ─────────────────────────────────── */
        .sa-plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
            gap: .8rem;
        }
        .sa-plan-card {
            background: #111;
            border: 1px solid rgba(124,108,92,.18);
            border-radius: 12px;
            padding: 1.1rem 1rem .9rem;
            display: flex; flex-direction: column; gap: .45rem;
            position: relative;
        }
        .sa-plan-card.sa-plan-recommended { border-color: rgba(200,184,154,.32); background: rgba(200,184,154,.03); }
        .sa-plan-rec-badge {
            position: absolute; top: -9px; left: 50%; transform: translateX(-50%);
            background: #c8b89a; color: #0e0e0e;
            font-size: .5rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
            padding: .18rem .65rem; border-radius: 10px; white-space: nowrap;
        }
        .sa-plan-name { font-size: .85rem; font-weight: 600; color: #c8b89a; margin-top: .25rem; }
        .sa-plan-price { font-size: 1.55rem; font-weight: 700; color: #ede4d8; line-height: 1; }
        .sa-plan-price span { font-size: .72rem; color: rgba(200,184,154,.5); font-weight: 400; }
        .sa-plan-meta { font-size: .68rem; color: rgba(200,184,154,.4); }
        .sa-plan-saving {
            font-size: .63rem; color: #5cbf7a;
            background: rgba(40,167,69,.1); border: 1px solid rgba(40,167,69,.2);
            border-radius: 8px; padding: .18rem .5rem; display: inline-block; width: fit-content;
        }
        .sa-plan-link-status { font-size: .63rem; padding: .2rem .5rem; border-radius: 6px; width: fit-content; }
        .sa-plan-link-status.has-link { color: #5cbf7a; background: rgba(40,167,69,.08); }
        .sa-plan-link-status.no-link  { color: #f0a500; background: rgba(240,160,0,.08); }
        .sa-plan-actions { display: flex; gap: .4rem; margin-top: auto; padding-top: .6rem; }

        @media (max-width: 900px) {
            .sa-stats { grid-template-columns: repeat(3,1fr); }
            .sa-charts { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .sa-stats { grid-template-columns: repeat(2,1fr); }
        }
    </style>
</head>
<body class="admin-page">

<!-- Topbar -->
<div class="admin-topbar">
    <div class="topbar-left">
        <span id="topbarRestName" style="color:#c8b89a;font-size:.95rem;font-weight:600">SuperAdmin</span>
        <a href="dashboard.html" class="btn-back"><i data-lucide="store" class="icon" style="width:13px;height:13px;stroke-width:1.75"></i> Mis restaurantes</a>
    </div>
    <div class="topbar-right">
        <span id="topbarUserName"></span>
        <button class="theme-btn" id="themeBtn"><i data-lucide="sun" style="width:15px;height:15px;stroke-width:1.75"></i></button>
        <button id="saLogoutBtn">Cerrar sesión</button>
    </div>
</div>

<div id="saLoading" class="sa-loading">Cargando datos...</div>

<div class="sa-wrap" id="saContent" style="display:none">

    <!-- Planes de Suscripción -->
    <div class="sa-section" style="padding:1.2rem 1.5rem">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.6rem">
            <div class="sa-section-title">Planes de suscripción</div>
            <button onclick="editPlan(-1)" style="background:rgba(40,167,69,.12);border:1px solid rgba(40,167,69,.28);color:#5cbf7a;border-radius:8px;padding:.38rem 1rem;font-size:.72rem;cursor:pointer;display:inline-flex;align-items:center;gap:5px"><i data-lucide="plus" class="icon" style="width:13px;height:13px;stroke-width:2"></i> Agregar plan</button>
        </div>
        <div class="sa-plans-grid" id="plansList">
            <p style="color:rgba(200,184,154,.3);font-size:.78rem">Cargando planes...</p>
        </div>
    </div>

    <!-- Cupones -->
    <div class="sa-section" style="padding:1.2rem 1.5rem">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.6rem">
            <div class="sa-section-title">Cupones de acceso</div>
            <button onclick="createCoupon()" style="background:rgba(40,167,69,.12);border:1px solid rgba(40,167,69,.28);color:#5cbf7a;border-radius:8px;padding:.38rem 1rem;font-size:.72rem;cursor:pointer;display:inline-flex;align-items:center;gap:5px"><i data-lucide="plus" class="icon" style="width:13px;height:13px;stroke-width:2"></i> Nuevo cupón</button>
        </div>
        <div id="couponsList" style="font-size:.78rem;color:rgba(200,184,154,.3)">Cargando cupones...</div>
    </div>

    <!-- Stats -->
    <div class="sa-stats" id="statsRow"></div>

    <!-- Charts -->
    <div class="sa-charts">
        <div class="sa-chart-card">
            <div class="sa-chart-title">Nuevos usuarios por mes</div>
            <canvas id="chartMonthly" style="max-height:160px"></canvas>
        </div>
        <div class="sa-chart-card">
            <div class="sa-chart-title">Estado de suscripciones</div>
            <canvas id="chartStatus" style="max-height:160px"></canvas>
        </div>
    </div>

    <!-- Users table -->
    <div class="sa-section">
        <div class="sa-section-head">
            <h2 class="sa-section-title">Clientes</h2>
            <div class="sa-controls">
                <input type="search" class="sa-search" id="searchInput" placeholder="Buscar usuario...">
                <div class="sa-filter-tabs">
                    <button class="sa-tab active" data-filter="all">Todos</button>
                    <button class="sa-tab" data-filter="active">Activos</button>
                    <button class="sa-tab" data-filter="unpaid">Impagos</button>
                    <button class="sa-tab" data-filter="blocked">Bloqueados</button>
                </div>
            </div>
        </div>
        <div class="sa-table-wrap">
            <table class="sa-table">
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Restaurantes</th>
                        <th>Plan</th>
                        <th>Estado</th>
                        <th>Pagado hasta</th>
                        <th>Último acceso</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/lucide@0.309.0/dist/umd/lucide.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="./Js/theme.js"></script>
<script src="./Js/firebase-config.js?v=3"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="./Js/benefits-config.js"></script>
<script>

const SUPERADMIN_EMAIL = 'frivasv2388@gmail.com';

let allUsers = [];
let appPlans = [];
let activeFilter = 'all';
let searchTerm   = '';
let chartMonthly, chartStatus;

// ── Auth guard ────────────────────────────────────────────────

auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = './login.html'; return; }
    if (user.email !== SUPERADMIN_EMAIL) { window.location.href = './dashboard.html'; return; }

    document.getElementById('topbarUserName').textContent = user.displayName || user.email;
    document.getElementById('saLogoutBtn').addEventListener('click', () =>
        auth.signOut().then(() => window.location.href = './login.html')
    );
    initThemeToggle('themeBtn');

    await loadData();
    await loadPlansConfig();
    await loadCoupons();
});

// ── Plan management ───────────────────────────────────────────

async function loadPlansConfig() {
    try {
        const snap = await db.collection('appConfig').doc('plans').get();
        if (snap.exists && (snap.data().list || []).length) {
            appPlans = snap.data().list;
        } else {
            // Migrate from old payments doc
            const pay = await db.collection('appConfig').doc('payments').get().catch(() => null);
            const d = pay && pay.exists ? pay.data() : {};
            appPlans = [
                { id: 'monthly',   label: 'Mensual',    price: 20000, durationDays: 30, mpLink: d.mpLinkMonthly   || '', savingsLabel: '',              recommended: false },
                { id: 'quarterly', label: 'Trimestral', price: 54000, durationDays: 90, mpLink: d.mpLinkQuarterly || '', savingsLabel: 'Ahorrás $6.000', recommended: true  },
            ];
        }
    } catch(e) { console.error('Error cargando planes:', e); }
    renderPlans();
}

async function savePlans() {
    await db.collection('appConfig').doc('plans').set({ list: appPlans });
}

function renderPlans() {
    const container = document.getElementById('plansList');
    if (!appPlans.length) {
        container.innerHTML = '<p style="color:rgba(200,184,154,.3);font-size:.78rem">No hay planes configurados.</p>';
        return;
    }
    container.innerHTML = appPlans.map((p, i) => {
        const benefitBadges = p.benefits ? BENEFITS_CONFIG.map(b => {
            const on  = hasBenefit(p.benefits, b.id);
            const lbl = b.id === 'restaurants' ? `${p.benefits.restaurants||1} rest.` : b.label;
            return `<span style="font-size:.6rem;padding:.15rem .45rem;border-radius:4px;${on
                ? 'background:rgba(40,167,69,.12);color:#5cbf7a;border:1px solid rgba(40,167,69,.25)'
                : 'background:rgba(124,108,92,.08);color:rgba(200,184,154,.3);border:1px solid rgba(124,108,92,.15)'}">${lbl}</span>`;
        }).join('') : '';
        return `
        <div class="sa-plan-card ${p.recommended ? 'sa-plan-recommended' : ''}">
            ${p.recommended ? '<span class="sa-plan-rec-badge">✦ Recomendado</span>' : ''}
            <div class="sa-plan-name">${esc(p.label)}</div>
            <div class="sa-plan-price">$${Number(p.price).toLocaleString('es-AR')} <span>ARS</span></div>
            <div class="sa-plan-meta">${p.durationDays} días de acceso</div>
            ${p.savingsLabel ? `<div class="sa-plan-saving">${esc(p.savingsLabel)}</div>` : ''}
            ${benefitBadges ? `<div style="display:flex;flex-wrap:wrap;gap:3px;margin:.4rem 0">${benefitBadges}</div>` : ''}
            <div class="sa-plan-link-status ${p.mpLink ? 'has-link' : 'no-link'}">
                ${p.mpLink ? `${licon('link-2',12)} Link MP configurado` : `${licon('alert-triangle',12)} Sin link de pago`}
            </div>
            <div class="sa-plan-actions">
                <button class="sa-btn sa-btn-unblock" onclick="editPlan(${i})" style="flex:1">Editar</button>
                <button class="sa-btn sa-btn-delete"  onclick="deletePlan(${i})">✕</button>
            </div>
        </div>`;
    }).join('');
}

async function editPlan(idx) {
    const isNew = idx < 0;
    const plan  = isNew
        ? { label: '', price: '', durationDays: 30, mpLink: '', savingsLabel: '', recommended: false }
        : appPlans[idx];

    const inp = 'width:100%;background:#111;border:1px solid rgba(200,184,154,.2);border-radius:8px;color:#c8b89a;font-size:.82rem;padding:.48rem .8rem;outline:none;font-family:inherit;margin-bottom:.5rem;box-sizing:border-box';
    const lbl = 'font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:rgba(200,184,154,.4);display:block;margin-bottom:.2rem;text-align:left';

    const { value: form, isConfirmed } = await Swal.fire({
        title: isNew ? 'Nuevo plan' : 'Editar plan',
        html: `<div style="text-align:left">
            <label style="${lbl}">Nombre del plan</label>
            <input id="sp-label" style="${inp}" value="${esc(plan.label)}" placeholder="Ej: Mensual">
            <label style="${lbl}">Precio (ARS)</label>
            <input id="sp-price" type="number" min="0" style="${inp}" value="${plan.price}" placeholder="20000">
            <label style="${lbl}">Duración (días)</label>
            <input id="sp-days"  type="number" min="1" style="${inp}" value="${plan.durationDays}" placeholder="30">
            <label style="${lbl}">Link de Mercado Pago</label>
            <input id="sp-link"  type="url" style="${inp}" value="${esc(plan.mpLink || '')}" placeholder="https://mpago.la/...">
            <label style="${lbl}">Etiqueta de ahorro (opcional)</label>
            <input id="sp-save" style="${inp}" value="${esc(plan.savingsLabel || '')}" placeholder="Ej: Ahorrás $6.000">
            <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.8rem;color:rgba(200,184,154,.6);margin-top:.3rem">
                <input type="checkbox" id="sp-rec" ${plan.recommended ? 'checked' : ''} style="accent-color:#c8b89a">
                Marcar como recomendado
            </label>
            <div style="border-top:1px solid rgba(200,184,154,.12);margin-top:.8rem;padding-top:.8rem">
                <div style="${lbl}">Beneficios del plan</div>
                <div style="margin:.5rem 0 .6rem">
                    <div style="${lbl};margin-bottom:.3rem">Restaurantes</div>
                    <div style="display:flex;gap:.8rem">
                        ${[1,3,5].map(n => `<label style="display:flex;align-items:center;gap:.3rem;font-size:.8rem;color:rgba(200,184,154,.7);cursor:pointer">
                            <input type="radio" name="sp-restaurants" value="${n}" ${(plan.benefits?.restaurants||1)===n?'checked':''} style="accent-color:#c8b89a"> ${n}
                        </label>`).join('')}
                    </div>
                </div>
                ${BENEFITS_CONFIG.filter(b => b.type === 'bool').map(b => `
                    <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.78rem;color:rgba(200,184,154,.65);margin:.3rem 0">
                        <input type="checkbox" id="sp-${b.id}" ${plan.benefits?.[b.id]!==false?'checked':''} style="accent-color:#c8b89a">
                        ${b.label}
                    </label>`).join('')}
            </div>
        </div>`,
        focusConfirm: false,
        showCancelButton: true,
        confirmButtonText: isNew ? 'Crear plan' : 'Guardar',
        cancelButtonText: 'Cancelar',
        background: '#1a1a1a',
        color: '#c8b89a',
        confirmButtonColor: '#2d9a4e',
        cancelButtonColor: 'rgba(124,108,92,.3)',
        preConfirm: () => {
            const label       = document.getElementById('sp-label').value.trim();
            const price       = +document.getElementById('sp-price').value;
            const durationDays = +document.getElementById('sp-days').value;
            if (!label)          { Swal.showValidationMessage('El nombre es obligatorio'); return false; }
            if (!price || price <= 0) { Swal.showValidationMessage('Ingresá un precio válido'); return false; }
            if (!durationDays || durationDays <= 0) { Swal.showValidationMessage('Ingresá una duración válida'); return false; }
            const restaurants = parseInt(document.querySelector('input[name="sp-restaurants"]:checked')?.value || '1');
            const benefits = { restaurants };
            BENEFITS_CONFIG.filter(b => b.type === 'bool').forEach(b => {
                benefits[b.id] = document.getElementById(`sp-${b.id}`)?.checked ?? true;
            });
            return {
                label,
                price,
                durationDays,
                mpLink:       document.getElementById('sp-link').value.trim(),
                savingsLabel: document.getElementById('sp-save').value.trim(),
                recommended:  document.getElementById('sp-rec').checked,
                benefits,
            };
        },
    });
    if (!isConfirmed || !form) return;

    if (isNew) {
        appPlans.push({ id: String(Date.now()), ...form });
    } else {
        appPlans[idx] = { ...appPlans[idx], ...form };
    }
    try {
        await savePlans();
        renderPlans();
        Swal.fire({ toast:true, position:'top-end', icon:'success', title: isNew ? 'Plan creado' : 'Plan actualizado', timer:2000, showConfirmButton:false, background:'#1a1a1a', color:'#c8b89a' });
    } catch(e) {
        Swal.fire({ toast:true, position:'top-end', icon:'error', title:'Error al guardar', timer:3000, showConfirmButton:false, background:'#1a1a1a', color:'#c8b89a' });
    }
}

async function deletePlan(idx) {
    const plan = appPlans[idx];
    const { isConfirmed } = await Swal.fire({
        title: `¿Eliminar plan "${plan.label}"?`,
        text: 'Esta acción no se puede deshacer.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Eliminar',
        cancelButtonText: 'Cancelar',
        background: '#1a1a1a',
        color: '#c8b89a',
        confirmButtonColor: '#c0392b',
        cancelButtonColor: 'rgba(124,108,92,.3)',
    });
    if (!isConfirmed) return;
    appPlans.splice(idx, 1);
    try {
        await savePlans();
        renderPlans();
        Swal.fire({ toast:true, position:'top-end', icon:'success', title:'Plan eliminado', timer:2000, showConfirmButton:false, background:'#1a1a1a', color:'#c8b89a' });
    } catch(e) {}
}

async function deleteUser(uid, name) {
    const userEntry = allUsers.find(u => u.uid === uid);
    const restCount = userEntry?.restaurants?.length || 0;
    const restNote  = restCount > 0
        ? `También se eliminarán sus <b>${restCount}</b> restaurante${restCount > 1 ? 's' : ''}.<br>`
        : '';

    const { isConfirmed } = await Swal.fire({
        title: `¿Eliminar a ${name}?`,
        html: `${restNote}Se eliminarán sus datos y suscripción.<br><small style="color:rgba(200,184,154,.4)">No se elimina su cuenta de Google.</small>`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Eliminar',
        cancelButtonText: 'Cancelar',
        background: '#1a1a1a',
        color: '#c8b89a',
        confirmButtonColor: '#c0392b',
        cancelButtonColor: 'rgba(124,108,92,.3)',
    });
    if (!isConfirmed) return;
    try {
        const restaurants = userEntry?.restaurants || [];
        await Promise.all([
            db.collection('users').doc(uid).delete(),
            ...restaurants.map(r => db.collection('restaurants').doc(r.id).delete()),
        ]);
        allUsers = allUsers.filter(u => u.uid !== uid);
        renderStats(); renderCharts(); renderTable();
        Swal.fire({ toast:true, position:'top-end', icon:'success', title:'Usuario eliminado', timer:2000, showConfirmButton:false, background:'#1a1a1a', color:'#c8b89a' });
    } catch(err) {
        console.error(err);
        Swal.fire({ toast:true, position:'top-end', icon:'error', title:'Error al eliminar', timer:3000, showConfirmButton:false, background:'#1a1a1a', color:'#c8b89a' });
    }
}

async function createCoupon() {
    const inp  = 'width:100%;background:#111;border:1px solid rgba(200,184,154,.2);border-radius:8px;color:#c8b89a;font-size:.82rem;padding:.48rem .8rem;outline:none;font-family:inherit;margin-bottom:.5rem;box-sizing:border-box';
    const lbl  = 'font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:rgba(200,184,154,.4);display:block;margin-bottom:.2rem;text-align:left';
    const planOptions = appPlans.map(p => `<option value="${p.id}">${esc(p.label)}</option>`).join('');

    const { value: form, isConfirmed } = await Swal.fire({
        title: 'Nuevo cupón',
        html: `<div style="text-align:left">
            <label style="${lbl}">Código del cupón</label>
            <input id="cp-code" style="${inp}" placeholder="ej: GRATIS2025" style="text-transform:uppercase">
            <label style="${lbl}">Plan que otorga</label>
            <select id="cp-plan" style="${inp}">${planOptions}</select>
            <label style="${lbl}">Usos máximos (0 = ilimitado)</label>
            <input id="cp-uses" type="number" min="0" style="${inp}" value="1">
            <label style="${lbl}">Descripción (opcional)</label>
            <input id="cp-label" style="${inp}" placeholder="ej: Prueba gratuita para X">

        focusConfirm: false,
        showCancelButton: true,
        confirmButtonText: 'Crear cupón',
        cancelButtonText: 'Cancelar',
        background: '#1a1a1a', color: '#c8b89a',
        confirmButtonColor: '#2d9a4e',
        cancelButtonColor: 'rgba(124,108,92,.3)',
        preConfirm: () => {
            const code  = document.getElementById('cp-code').value.trim().toUpperCase();
            const planId = document.getElementById('cp-plan').value;
            const uses  = parseInt(document.getElementById('cp-uses').value) || 0;
            const label = document.getElementById('cp-label').value.trim();
            if (!code) { Swal.showValidationMessage('El código es obligatorio'); return false; }

    });

async function toggleCoupon(i) {
    appCoupons[i].active = !appCoupons[i].active;
    await saveCoupons();

}

async function loadData() {
    try {
        const [usersSnap, restsSnap] = await Promise.all([
            db.collection('users').get(),
            db.collection('restaurants').get(),
        ]);

        const usersMap = {};
        usersSnap.forEach(doc => { usersMap[doc.id] = { uid: doc.id, ...doc.data() }; });

        const restsByOwner = {};
        restsSnap.forEach(doc => {
            const d = doc.data();
            if (!restsByOwner[d.ownerId]) restsByOwner[d.ownerId] = [];
            restsByOwner[d.ownerId].push({ id: doc.id, nombre: d.nombre || 'Sin nombre' });
        });

        // Include owners without a users doc — show restaurant names as identifier
        Object.keys(restsByOwner).forEach(uid => {
            if (!usersMap[uid]) {
                const restNames = restsByOwner[uid].map(r => r.nombre).join(', ');
                usersMap[uid] = { uid, email: `UID: ${uid.slice(0,10)}…`, displayName: `Sin registro (${restNames})` };
            }
        });

        allUsers = Object.values(usersMap).map(u => ({
            ...u,
            restaurants: restsByOwner[u.uid] || [],
            subscription: u.subscription || { status: 'unpaid' }
        }));

        allUsers.sort((a, b) => (b.lastLogin?.seconds ?? 0) - (a.lastLogin?.seconds ?? 0));

        renderStats();
        renderCharts();
        renderTable();

        document.getElementById('saLoading').style.display  = 'none';
        document.getElementById('saContent').style.display  = '';
    } catch (err) {
        console.error(err);
        document.getElementById('saLoading').textContent = 'Error al cargar. Revisá la consola.';
    }
}

function renderStats() {
    const total     = allUsers.length;
    const active    = allUsers.filter(u => u.subscription?.status === 'active').length;
    const unpaid    = allUsers.filter(u => !u.subscription?.status || u.subscription.status === 'unpaid').length;
    const blocked   = allUsers.filter(u => u.subscription?.status === 'blocked').length;
    const totalRest = allUsers.reduce((acc, u) => acc + u.restaurants.length, 0);

    const cards = [
        { icon: 'users',          num: total,    label: 'Usuarios totales' },
        { icon: 'check-circle-2', num: active,   label: 'Suscripciones activas' },
        { icon: 'alert-triangle', num: unpaid,   label: 'Con deuda' },
        { icon: 'ban',            num: blocked,  label: 'Bloqueados' },
        { icon: 'store',          num: totalRest, label: 'Restaurantes totales' },
    ];

    document.getElementById('statsRow').innerHTML = cards.map(c => `
        <div class="sa-stat">
            <div class="sa-stat-icon">${licon(c.icon, 18)}</div>
            <div class="sa-stat-num">${c.num}</div>
            <div class="sa-stat-label">${c.label}</div>
        </div>`).join('');
}

// ── Charts ────────────────────────────────────────────────────

function renderCharts() {
    Chart.defaults.color = 'rgba(200,184,154,.5)';

    // Monthly registrations (last 6 months)
    const monthLabels = [];
    const monthData   = [];
    const now = new Date();
    const NAMES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    for (let i = 5; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        monthLabels.push(`${NAMES[d.getMonth()]} ${d.getFullYear()}`);
        const count = allUsers.filter(u => {
            if (!u.createdAt?.seconds) return false;
            const ud = new Date(u.createdAt.seconds * 1000);
            return ud.getFullYear() === d.getFullYear() && ud.getMonth() === d.getMonth();
        }).length;
        monthData.push(count);
    }

    const ctxM = document.getElementById('chartMonthly').getContext('2d');
    if (chartMonthly) chartMonthly.destroy();
    chartMonthly = new Chart(ctxM, {
        type: 'bar',
        data: {
            labels: monthLabels,
            datasets: [{
                label: 'Nuevos usuarios',
                data: monthData,
                backgroundColor: 'rgba(200,184,154,.25)',
                borderColor: 'rgba(200,184,154,.6)',
                borderWidth: 1,
                borderRadius: 6,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { color: 'rgba(124,108,92,.1)' }, ticks: { font: { size: 10 } } },
                y: { grid: { color: 'rgba(124,108,92,.1)' }, ticks: { stepSize: 1, font: { size: 10 } }, beginAtZero: true }
            }
        }
    });

    // Status doughnut
    const active  = allUsers.filter(u => u.subscription?.status === 'active').length;
    const unpaid  = allUsers.filter(u => !u.subscription?.status || u.subscription.status === 'unpaid').length;
    const blocked = allUsers.filter(u => u.subscription?.status === 'blocked').length;

    const ctxS = document.getElementById('chartStatus').getContext('2d');
    if (chartStatus) chartStatus.destroy();
    chartStatus = new Chart(ctxS, {
        type: 'doughnut',
        data: {
            labels: ['Activos', 'Impagos', 'Bloqueados'],
            datasets: [{
                data: [active, unpaid, blocked],
                backgroundColor: ['rgba(40,167,69,.65)', 'rgba(240,160,0,.65)', 'rgba(220,53,69,.65)'],
                borderColor:     ['rgba(40,167,69,.3)',  'rgba(240,160,0,.3)',  'rgba(220,53,69,.3)'],
                borderWidth: 1,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '65%',
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: { padding: 12, font: { size: 10 }, boxWidth: 10, color: 'rgba(200,184,154,.6)' }
                }
            }
        }
    });
}

// ── Table ─────────────────────────────────────────────────────

function renderTable() {
    const tbody  = document.getElementById('usersTableBody');
    const term   = searchTerm.toLowerCase();

    const filtered = allUsers.filter(u => {
        const matchFilter =
            activeFilter === 'all'     ? true :
            activeFilter === 'active'  ? u.subscription?.status === 'active' :
            activeFilter === 'unpaid'  ? (!u.subscription?.status || u.subscription.status === 'unpaid') :
            activeFilter === 'blocked' ? u.subscription?.status === 'blocked' : true;

        const matchSearch = !term ||
            (u.displayName || '').toLowerCase().includes(term) ||
            (u.email || '').toLowerCase().includes(term);

        return matchFilter && matchSearch;
    });

    if (!filtered.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="sa-empty">No hay usuarios que coincidan.</td></tr>`;
        return;
    }

    tbody.innerHTML = filtered.map(u => {
        const status    = u.subscription?.status || 'unpaid';
        const badgeClass = status === 'active' ? 'sa-badge-active'
                         : status === 'blocked' ? 'sa-badge-blocked'
                         : status === 'pending_payment' ? 'sa-badge-pending'
                         : 'sa-badge-unpaid';
        const badgeText  = status === 'active' ? `${licon('check',11)} Activo`
                         : status === 'blocked' ? `${licon('ban',11)} Bloqueado`
                         : status === 'pending_payment' ? `${licon('clock',11)} Pago pendiente`
                         : `${licon('alert-triangle',11)} Impago`;

        const paidUntil = u.subscription?.paidUntil?.seconds
            ? new Date(u.subscription.paidUntil.seconds * 1000).toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric' })
            : '—';

        const lastLogin = u.lastLogin?.seconds
            ? timeAgo(u.lastLogin.seconds * 1000)
            : 'Nunca';

        const fullName = u.nombre && u.apellido ? `${u.nombre} ${u.apellido}` : null;
        const name    = esc(fullName || u.displayName || u.email?.split('@')[0] || 'Sin nombre');
        const email   = esc(u.email || u.uid.slice(0,12) + '…');
        const initials = (fullName || u.displayName || u.email || 'U').slice(0,2).toUpperCase();
        const color   = avatarColor(u.uid);

        const safeName = name.replace(/'/g, "\\'");
        const viewBtn = u.restaurants.length
            ? `<button class="sa-btn sa-btn-view" onclick="viewPanel('${u.uid}')">${licon('eye',12)} Ver</button>`
            : '';
        const priceBtn = u.restaurants.length
            ? `<button class="sa-btn sa-btn-prices" onclick="toggleHidePrices('${u.uid}')">${licon('tag',12)} Precios</button>`
            : '';

        const actions = status === 'blocked'
            ? `${viewBtn}${priceBtn}
               <button class="sa-btn sa-btn-unblock" onclick="setStatus('${u.uid}','unpaid')">${licon('shield-check',12)} Desbloquear</button>
               <button class="sa-btn sa-btn-delete"  onclick="deleteUser('${u.uid}','${safeName}')">${licon('trash-2',12)} Eliminar</button>`
            : status === 'pending_payment'
            ? `${viewBtn}${priceBtn}
               <button class="sa-btn sa-btn-paid"  onclick="markPaid('${u.uid}')">${licon('check',12)} Confirmar pago</button>
               <button class="sa-btn sa-btn-block"  onclick="setStatus('${u.uid}','blocked')">${licon('ban',12)} Bloquear</button>
               <button class="sa-btn sa-btn-delete" onclick="deleteUser('${u.uid}','${safeName}')">${licon('trash-2',12)} Eliminar</button>`
            : `${viewBtn}${priceBtn}
               <button class="sa-btn sa-btn-paid"  onclick="markPaid('${u.uid}')">${licon('credit-card',12)} Marcar pagado</button>
               <button class="sa-btn sa-btn-block"  onclick="setStatus('${u.uid}','blocked')">${licon('ban',12)} Bloquear</button>
               <button class="sa-btn sa-btn-delete" onclick="deleteUser('${u.uid}','${safeName}')">${licon('trash-2',12)} Eliminar</button>`;

        return `<tr>
            <td>
                <div class="sa-user-cell">
                    <div class="sa-avatar" style="background:${color}">${initials}</div>
                    <div>
                        <div class="sa-user-name">${name}</div>
                        <div class="sa-user-email">${email}</div>
                        ${u.phone ? `<div style="font-size:.65rem;color:rgba(200,184,154,.35);margin-top:.1rem">📞 ${esc(u.phone)}</div>` : ''}
                    </div>
                </div>
            </td>
            <td>
                <span class="sa-badge sa-badge-rest">${u.restaurants.length} rest.</span>
            </td>
            <td style="font-size:.75rem;color:rgba(200,184,154,.65)">
                ${appPlans.find(p => p.id === u.subscription?.planType)?.label
                    ? `<span style="background:rgba(200,184,154,.08);border:1px solid rgba(200,184,154,.18);border-radius:5px;padding:.15rem .5rem;font-size:.68rem">${esc(appPlans.find(p => p.id === u.subscription?.planType).label)}</span>`
                    : '<span style="color:rgba(200,184,154,.25);font-size:.7rem">—</span>'}
            </td>
            <td><span class="sa-badge ${badgeClass}">${badgeText}</span></td>
            <td style="font-size:.75rem;color:rgba(200,184,154,.5)">${paidUntil}</td>
            <td style="font-size:.75rem;color:rgba(200,184,154,.4)">${lastLogin}</td>
            <td><div class="sa-actions">${actions}</div></td>
        </tr>`;
    }).join('');
}

async function setStatus(uid, status) {
    const labels = { active: 'Activo', unpaid: 'Impago', blocked: 'Bloqueado' };
    const { isConfirmed } = await Swal.fire({
        title: `¿Cambiar a "${labels[status]}"?`,
        text: status === 'blocked' ? 'El usuario no podrá acceder al panel.' : '',
        icon: status === 'blocked' ? 'warning' : 'question',
        showCancelButton: true,
        confirmButtonText: 'Confirmar',
        cancelButtonText: 'Cancelar',
        background: '#1a1a1a',
        color: '#c8b89a',
        confirmButtonColor: status === 'blocked' ? '#c0392b' : '#2d9a4e',
        cancelButtonColor: 'rgba(124,108,92,.3)',
    });
    if (!isConfirmed) return;

    try {
        await db.collection('users').doc(uid).set(
            { subscription: { status } },
            { merge: true }
        );
        const u = allUsers.find(u => u.uid === uid);
        if (u) u.subscription = { ...u.subscription, status };
        renderStats();
        renderCharts();
        renderTable();
        Swal.fire({ toast:true, position:'top-end', icon:'success', title:'Actualizado', timer:2000, showConfirmButton:false, background:'#1a1a1a', color:'#c8b89a' });
    } catch (err) {
        console.error(err);
        Swal.fire({ toast:true, position:'top-end', icon:'error', title:'Error al guardar', timer:3000, showConfirmButton:false, background:'#1a1a1a', color:'#c8b89a' });
    }
}

async function markPaid(uid) {
    if (!appPlans.length) {
        Swal.fire({ toast:true, position:'top-end', icon:'warning', title:'No hay planes configurados', timer:3000, showConfirmButton:false, background:'#1a1a1a', color:'#c8b89a' });
        return;
    }

    const inputOptions = {};
    appPlans.forEach(p => {
        inputOptions[p.id] = `${p.label} — $${Number(p.price).toLocaleString('es-AR')} (${p.durationDays} días)`;
    });
    const defaultPlan = (appPlans.find(p => p.recommended) || appPlans[0]).id;

    const { value: planId, isConfirmed } = await Swal.fire({
        title: 'Confirmar pago',
        input: 'radio',
        inputOptions,
        inputValue: defaultPlan,
        showCancelButton: true,
        confirmButtonText: 'Confirmar',
        cancelButtonText: 'Cancelar',
        background: '#1a1a1a',
        color: '#c8b89a',
        confirmButtonColor: '#2d9a4e',
        cancelButtonColor: 'rgba(124,108,92,.3)',
        inputValidator: v => !v && 'Seleccioná un plan',
    });
    if (!isConfirmed || !planId) return;

    const plan = appPlans.find(p => p.id === planId);
    if (!plan) return;

    const paidUntil = new Date();
    paidUntil.setDate(paidUntil.getDate() + plan.durationDays);

    try {
        await db.collection('users').doc(uid).set(
            { subscription: { status: 'active', planType: plan.id, paidUntil: firebase.firestore.Timestamp.fromDate(paidUntil) } },
            { merge: true }
        );
        const u = allUsers.find(u => u.uid === uid);
        if (u) u.subscription = { status: 'active', planType: plan.id, paidUntil: { seconds: Math.floor(paidUntil.getTime() / 1000) } };
        renderStats(); renderCharts(); renderTable();
        Swal.fire({ toast:true, position:'top-end', icon:'success', title:`Plan "${plan.label}" confirmado (${plan.durationDays} días)`, timer:2500, showConfirmButton:false, background:'#1a1a1a', color:'#c8b89a' });
    } catch (err) {
        console.error(err);
        Swal.fire({ toast:true, position:'top-end', icon:'error', title:'Error al guardar', timer:3000, showConfirmButton:false, background:'#1a1a1a', color:'#c8b89a' });
    }
}

// ── View panel (impersonation) ────────────────────────────────

async function viewPanel(uid) {
    const u = allUsers.find(u => u.uid === uid);
    if (!u || !u.restaurants.length) return;

    if (u.restaurants.length === 1) {
        window.open(`./admin.html?r=${u.restaurants[0].id}&readonly=1`, '_blank');
        return;
    }

    const btnStyle = [
        'display:inline-flex', 'align-items:center', 'gap:8px',
        'background:rgba(124,108,92,.1)', 'border:1px solid rgba(124,108,92,.22)',
        'color:#c8b89a', 'border-radius:10px', 'padding:.6rem 1.1rem',
        'font-size:.85rem', 'cursor:pointer',
        'transition:background .15s,border-color .15s', 'font-family:inherit',
    ].join(';');

    const html = `<div style="display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center">` +
        u.restaurants.map(r => `
            <button style="${btnStyle}"
                onmouseover="this.style.background='rgba(124,108,92,.22)';this.style.borderColor='rgba(124,108,92,.45)'"
                onmouseout="this.style.background='rgba(124,108,92,.1)';this.style.borderColor='rgba(124,108,92,.22)'"
                onclick="window.open('./admin.html?r=${r.id}&readonly=1','_blank');Swal.close()">
                ${licon('store', 14)} ${esc(r.nombre || 'Sin nombre')}
            </button>`).join('') + `</div>`;

    await Swal.fire({
        title: 'Elegí el restaurante',
        html,
        showConfirmButton: false,
        showCancelButton: true,
        cancelButtonText: 'Cancelar',
        background: '#1a1a1a',
        color: '#c8b89a',
        cancelButtonColor: 'rgba(124,108,92,.3)',
    });
}

// ── Toggle hide prices ────────────────────────────────────────

async function toggleHidePrices(uid) {
    const u = allUsers.find(u => u.uid === uid);
    if (!u || !u.restaurants.length) return;

    if (u.restaurants.length === 1) {
        await doToggleHidePrices(u.restaurants[0]);
        return;
    }

    const btnStyle = [
        'display:inline-flex', 'align-items:center', 'gap:8px',
        'background:rgba(124,108,92,.1)', 'border:1px solid rgba(124,108,92,.22)',
        'color:#c8b89a', 'border-radius:10px', 'padding:.6rem 1.1rem',
        'font-size:.85rem', 'cursor:pointer',
        'transition:background .15s,border-color .15s', 'font-family:inherit',
    ].join(';');

    const html = `<div style="display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center">` +
        u.restaurants.map(r => `
            <button style="${btnStyle}"
                onmouseover="this.style.background='rgba(124,108,92,.22)';this.style.borderColor='rgba(124,108,92,.45)'"
                onmouseout="this.style.background='rgba(124,108,92,.1)';this.style.borderColor='rgba(124,108,92,.22)'"
                onclick="Swal.close();doToggleHidePrices({id:'${r.id}',nombre:'${esc(r.nombre || 'Sin nombre').replace(/'/g,"\\'")}'})" >
                ${licon('store', 14)} ${esc(r.nombre || 'Sin nombre')}
            </button>`).join('') + `</div>`;

    await Swal.fire({
        title: 'Elegí el restaurante',
        html,
        showConfirmButton: false,
        showCancelButton: true,
        cancelButtonText: 'Cancelar',
        background: '#1a1a1a',
        color: '#c8b89a',
        cancelButtonColor: 'rgba(124,108,92,.3)',
    });
}

async function doToggleHidePrices(rest) {
    const stylesRef = db.collection('restaurants').doc(rest.id).collection('config').doc('styles');
    let current = false;
    try {
        const doc = await stylesRef.get();
        current = doc.exists ? (doc.data().hidePrices || false) : false;
    } catch (err) {
        console.error(err);
        return;
    }
    const next = !current;

    const { isConfirmed } = await Swal.fire({
        title: next ? 'Ocultar precios' : 'Mostrar precios',
        html: `<span style="font-size:.9rem;color:rgba(200,184,154,.7)"><b>${esc(rest.nombre || 'Sin nombre')}</b> — los precios ${next ? 'quedarán <b>ocultos</b>' : 'volverán a ser <b>visibles</b>'} en el menú público.</span>`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Confirmar',
        cancelButtonText: 'Cancelar',
        background: '#1a1a1a',
        color: '#c8b89a',
        confirmButtonColor: next ? '#5080b4' : '#2d9a4e',
        cancelButtonColor: 'rgba(124,108,92,.3)',
    });
    if (!isConfirmed) return;

    try {
        await stylesRef.set({ hidePrices: next }, { merge: true });
        Swal.fire({
            toast: true, position: 'top-end', icon: 'success',
            title: next ? 'Precios ocultos en el menú' : 'Precios visibles en el menú',
            timer: 2500, showConfirmButton: false,
            background: '#1a1a1a', color: '#c8b89a',
        });
    } catch (err) {
        console.error(err);
        Swal.fire({ toast:true, position:'top-end', icon:'error', title:'Error al guardar', timer:3000, showConfirmButton:false, background:'#1a1a1a', color:'#c8b89a' });
    }
}

// ── Helpers ───────────────────────────────────────────────────

function timeAgo(ms) {
    const diff = Date.now() - ms;
    const m = Math.floor(diff / 60000);
    const h = Math.floor(diff / 3600000);
    const d = Math.floor(diff / 86400000);
    if (m < 2)  return 'Hace un momento';
    if (m < 60) return `Hace ${m} min`;
    if (h < 24) return `Hace ${h} h`;
    if (d < 30) return `Hace ${d} días`;
    return new Date(ms).toLocaleDateString('es-AR', { day:'2-digit', month:'short' });
}

const AVATAR_COLORS = ['#7C6C5C','#5C8070','#5C6C80','#80705C','#6C5C80','#5C7870'];
function avatarColor(uid) {
    let h = 0;
    for (let i = 0; i < uid.length; i++) h = (h * 31 + uid.charCodeAt(i)) & 0xffffffff;
    return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}

function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
