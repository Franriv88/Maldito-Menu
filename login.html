<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubierto — Iniciá sesión</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='88' font-family='Georgia,serif' font-style='italic' fill='%23c8b89a'>C</text></svg>">
    <link rel="stylesheet" href="./Css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
    <style>
        .login-card h1 {
            font-family: 'Cormorant Garant', serif;
            font-style: italic;
            font-weight: 300;
            font-size: 3.2rem;
            letter-spacing: .5px;
        }
        .blocked-notice {
            margin: 1.2rem 0 0;
            padding: .75rem 1rem;
            background: rgba(220,53,69,.1);
            border: 1px solid rgba(220,53,69,.3);
            border-radius: 8px;
            color: #e06070;
            font-size: .82rem;
            line-height: 1.5;
        }
    </style>
</head>
<body class="login-page">

    <div class="login-card">
        <h1>Cubierto</h1>
        <p class="subtitle">Creá y compartí tu menú digital</p>

        <button id="googleSignInBtn" class="btn-google">
            <span class="g-icon">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
            </span>
            <span class="btn-spinner"></span>
            <span class="btn-label">Continuar con Google</span>
        </button>

        <p class="login-disclaimer">Solo vos podés ver y editar tu menú.</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="./Js/firebase-config.js"></script>
    <script>
        // Mostrar aviso si el usuario fue bloqueado
        if (new URLSearchParams(location.search).get('reason') === 'blocked') {
            const card = document.querySelector('.login-card');
            const notice = document.createElement('p');
            notice.className = 'blocked-notice';
            notice.innerHTML = '🚫 <strong>Cuenta suspendida.</strong><br>Tu acceso fue bloqueado por el administrador. Contactá a <a href="mailto:frivasv2388@gmail.com" style="color:#e06070">soporte</a> para regularizar tu situación.';
            card.appendChild(notice);
            document.getElementById('googleSignInBtn').disabled = true;
            document.getElementById('googleSignInBtn').style.opacity = '.4';
            document.getElementById('googleSignInBtn').style.cursor = 'not-allowed';
        }

        auth.onAuthStateChanged(user => {
            if (!user) return;
            if (user.email === 'frivasv2388@gmail.com') {
                window.location.href = './superadmin.html';
            } else {
                window.location.href = './dashboard.html';
            }
        });

        document.getElementById('googleSignInBtn').addEventListener('click', function () {
            const btn   = this;
            const label = btn.querySelector('.btn-label');
            btn.disabled = true;
            btn.classList.add('is-loading');
            label.textContent = 'Conectando…';

            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => {
                console.error('Error al iniciar sesión:', err);
                btn.disabled = false;
                btn.classList.remove('is-loading');
                label.textContent = 'Continuar con Google';
                alert('No se pudo iniciar sesión. Intentá de nuevo.');
            });
        });
    </script>
</body>
</html>
